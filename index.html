<style>
  :root {
    --bg: #050818;
    --bg-2: #0B1027;
    --panel: rgba(11,16,39,0.85);
    --panel-2: rgba(17,24,56,0.9);
    --gold: #FCD34D;
    --gold-2: #F59E0B;
    --gold-dim: #B45309;
    --ink: #F8FAFC;
    --ink-2: #CBD5E1;
    --muted: #64748B;
    --muted-2: #475569;
    --line: rgba(252,211,77,0.18);
    --line-soft: rgba(148,163,184,0.08);
    --lead: #60A5FA;
    --prospect: #FCD34D;
    --client: #34D399;
    --google: #4285F4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);height:100%;overscroll-behavior:none;-webkit-text-size-adjust:100%;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px}
  input::placeholder,textarea::placeholder{color:#334155;}
  button,a.btn{-webkit-appearance:none;touch-action:manipulation;font-family:'Inter',sans-serif;cursor:pointer;}
  input,textarea{font-family:'Inter',sans-serif;}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.08)}}
  @keyframes pulse2{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.1;transform:scale(1.15)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  @keyframes orbit{to{transform:rotate(360deg)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;width:2px;height:2px;background:#E0E7FF;border-radius:50%;animation:twinkle 3s infinite;}

  #app{min-height:100dvh;min-height:-webkit-fill-available;background:radial-gradient(ellipse 80% 40% at 50% 0%, rgba(252,211,77,0.08) 0%, transparent 50%),radial-gradient(ellipse 90% 50% at 50% 100%, rgba(99,102,241,0.12) 0%, transparent 60%),var(--bg);font-family:'Inter',sans-serif;color:var(--ink-2);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;z-index:1;padding-bottom:env(safe-area-inset-bottom,0px);}

  .header{padding:max(env(safe-area-inset-top,0px),20px) 22px 0;padding-top:max(env(safe-area-inset-top,0px),28px);}
  .brand-row{display:flex;align-items:flex-start;justify-content:space-between;padding-top:6px;gap:10px;}
  .brand-mark{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
  .brand-star{font-size:18px;color:var(--gold);text-shadow:0 0 12px rgba(252,211,77,0.6);animation:twinkle 4s infinite;}
  .brand-eyebrow{font-size:9px;font-family:'DM Mono',monospace;color:var(--gold);letter-spacing:.32em;text-transform:uppercase;font-weight:500;}
  .brand-name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--ink);letter-spacing:-.5px;line-height:.95;}
  .brand-name em{font-style:italic;font-weight:500;color:var(--gold);}
  .brand-sub{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted-2);letter-spacing:.14em;text-transform:uppercase;margin-top:6px;}
  .header-loc{font-size:11.5px;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;letter-spacing:.04em;}
  .header-loc .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(252,211,77,0.8);}

  .header-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .btn-icon{background:rgba(252,211,77,0.08);border:1px solid rgba(252,211,77,0.22);border-radius:10px;width:40px;height:40px;color:var(--gold);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
  .btn-icon .badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#0F0A02;font-size:9px;font-weight:700;border-radius:8px;padding:2px 5px;min-width:16px;text-align:center;font-family:'DM Mono',monospace;}

  /* Data source toggle */
  .source-toggle{display:flex;gap:0;background:var(--panel);border:1px solid var(--line-soft);border-radius:11px;padding:3px;margin-bottom:12px;}
  .source-btn{flex:1;padding:8px 6px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--muted-2);font-family:'Inter',sans-serif;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:6px;min-height:36px;transition:all .15s;}
  .source-btn.active.google{background:rgba(66,133,244,0.18);color:var(--google);box-shadow:0 0 0 1px rgba(66,133,244,0.3);}
  .source-btn.active.osm{background:rgba(252,211,77,0.15);color:var(--gold);box-shadow:0 0 0 1px rgba(252,211,77,0.15);}
  .source-btn .src-ic{font-size:11px;font-family:'DM Mono',monospace;}

  .landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px 32px;gap:22px;}
  .compass{width:130px;height:130px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle at center, rgba(252,211,77,0.18) 0%, rgba(252,211,77,0.04) 60%, transparent 80%);}
  .compass-core{font-size:46px;color:var(--gold);text-shadow:0 0 24px rgba(252,211,77,0.7);z-index:2;}
  .compass-ring{position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(252,211,77,0.3);animation:orbit 30s linear infinite;}
  .compass-ring::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
  .compass-ring2{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(252,211,77,0.12);animation:pulse 3s ease-in-out infinite;}
  .compass-ring3{position:absolute;inset:-26px;border-radius:50%;border:1px solid rgba(252,211,77,0.06);animation:pulse2 3s ease-in-out 0.6s infinite;}

  .tagline{color:var(--muted);font-size:13px;line-height:1.7;max-width:280px;margin:0 auto;text-align:center;letter-spacing:.01em;}
  .tagline em{color:var(--gold);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:15px;}

  .radius-panel{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px 20px;}
  .radius-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'DM Mono',monospace;margin-bottom:14px;}
  .radius-head .lbl{font-size:10px;color:var(--muted-2);letter-spacing:.18em;text-transform:uppercase;}
  .radius-head .val{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);font-weight:600;letter-spacing:-.5px;}
  .radius-head .val em{font-style:normal;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:3px;}
  input[type=range]{width:100%;accent-color:var(--gold);height:18px;cursor:pointer;}
  .radius-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--muted-2);font-family:'DM Mono',monospace;margin-top:6px;letter-spacing:.05em;}

  .source-label{font-size:10px;color:var(--muted-2);font-family:'DM Mono',monospace;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;text-align:center;}

  .btn-scan{border:none;border-radius:14px;padding:18px 32px;color:#0F0A02;font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .2s;min-height:58px;width:100%;max-width:340px;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn-scan:not(:disabled){background:linear-gradient(135deg, #FCD34D, #F59E0B);box-shadow:0 8px 32px rgba(252,211,77,0.35), inset 0 1px 0 rgba(255,255,255,0.3);}
  .btn-scan:disabled{background:rgba(252,211,77,0.2);color:rgba(252,211,77,0.4);cursor:default;}
  .btn-scan .star-ic{font-size:14px;}

  .perm-box{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:16px;padding:18px;max-width:340px;width:100%;}
  .perm-title{font-weight:700;color:#FCA5A5;font-size:13px;margin-bottom:10px;display:flex;gap:8px;align-items:center;letter-spacing:.02em;}
  .perm-text{font-size:12.5px;color:var(--ink-2);line-height:1.7;margin-bottom:14px;}
  .btn-guide{width:100%;background:rgba(252,211,77,0.1);border:1px solid rgba(252,211,77,0.25);border-radius:11px;padding:12px;color:var(--gold);font-size:12.5px;font-weight:600;cursor:pointer;min-height:44px;font-family:'Inter',sans-serif;}
  .perm-divider{border-top:1px solid rgba(239,68,68,0.12);margin-top:14px;padding-top:12px;font-size:12px;color:var(--muted);text-align:center;}

  .error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.22);border-radius:12px;padding:13px 16px;font-size:13px;color:#FCA5A5;text-align:center;max-width:340px;width:100%;line-height:1.6;}

  .manual-label{font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;text-align:center;}
  .manual-row{display:flex;gap:8px;}
  .manual-input{flex:1;background:var(--panel-2);border:1px solid rgba(252,211,77,0.3);border-radius:12px;padding:14px;color:var(--ink);font-size:15px;outline:none;min-height:50px;}
  .manual-input:focus{border-color:var(--gold);}
  .btn-go{background:linear-gradient(135deg, #FCD34D, #F59E0B);border:none;border-radius:12px;padding:14px 22px;color:#0F0A02;font-weight:700;cursor:pointer;font-size:14px;min-width:64px;min-height:50px;text-transform:uppercase;letter-spacing:.05em;}
  .btn-go:disabled{opacity:.4;}
  .btn-manual-link{background:none;border:none;color:var(--muted-2);font-size:12.5px;cursor:pointer;padding:6px 8px;min-height:44px;letter-spacing:.02em;}

  .results{flex:1;display:flex;flex-direction:column;padding:14px 16px 0;min-height:0;}
  .results-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .btn-back{background:rgba(252,211,77,0.08);border:1px solid rgba(252,211,77,0.22);border-radius:10px;padding:0 12px;height:42px;color:var(--gold);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:'Inter',sans-serif;}
  .btn-back .ar{font-size:16px;line-height:1;}

  .search-wrap{position:relative;flex:1;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted-2);font-size:14px;pointer-events:none;}
  .search-input{width:100%;background:var(--panel);border:1px solid var(--line-soft);border-radius:11px;padding:11px 12px 11px 34px;color:var(--ink);font-size:14px;outline:none;min-height:42px;}
  .search-input:focus{border-color:rgba(252,211,77,0.3);}

  .cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line-soft);background:var(--panel);color:var(--muted-2);min-height:38px;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;letter-spacing:.01em;}
  .cat-btn.active{border-color:var(--gold);background:rgba(252,211,77,0.15);color:var(--gold);box-shadow:0 0 0 1px rgba(252,211,77,0.15);}

  .stats{display:flex;justify-content:space-between;align-items:center;padding:4px 2px 10px;}
  .stats span{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-2);}
  .stats span.count{color:var(--gold);}
  .stats .source-tag{display:inline-flex;align-items:center;gap:4px;}
  .stats .source-tag.google{color:var(--google);}

  .spinner{text-align:center;padding:48px 0;}
  .spinner-ring{width:36px;height:36px;border:2px solid rgba(252,211,77,0.2);border-top:2px solid var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;}
  .spinner p{color:var(--muted);font-size:12.5px;font-family:'DM Mono',monospace;letter-spacing:.05em;}

  .list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;padding-bottom:32px;-webkit-overflow-scrolling:touch;}
  .empty{text-align:center;padding:48px 16px;}
  .empty-icon{font-size:32px;margin-bottom:14px;color:var(--gold-dim);}
  .empty h3{font-size:15px;color:var(--ink-2);font-family:'Cormorant Garamond',serif;font-weight:600;}
  .empty p{font-size:13px;margin-top:8px;color:var(--muted);line-height:1.6;}

  .biz-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;min-height:64px;transition:background .15s,border-color .15s;position:relative;}
  .biz-card:active{background:var(--panel-2);}
  .biz-card.has-contact{border-color:rgba(252,211,77,0.15);}
  .biz-card.saved-lead{border-left:3px solid var(--lead);}
  .biz-card.saved-prospect{border-left:3px solid var(--prospect);}
  .biz-card.saved-client{border-left:3px solid var(--client);}
  .biz-icon{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;}
  .biz-info{flex:1;min-width:0;}
  .biz-name{font-weight:600;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.005em;}
  .biz-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
  .biz-type{font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.08em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .biz-dot{width:2px;height:2px;border-radius:50%;background:var(--muted-2);flex-shrink:0;}
  .biz-dist{font-size:11px;color:var(--gold);font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0;}
  .biz-rating{font-size:10.5px;color:#FBBF24;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
  .biz-rating .stars-bar{color:#FBBF24;}
  .biz-rating .reviews{color:var(--muted-2);font-family:'DM Mono',monospace;font-size:9.5px;font-weight:normal;}
  .saved-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
  .saved-tag.lead{background:rgba(96,165,250,0.15);color:var(--lead);}
  .saved-tag.prospect{background:rgba(252,211,77,0.15);color:var(--prospect);}
  .saved-tag.client{background:rgba(52,211,153,0.15);color:var(--client);}
  .note-badge{font-size:10px;color:var(--muted-2);}

  .biz-actions{display:flex;gap:6px;flex-shrink:0;}
  .btn-call{background:linear-gradient(135deg,#34D399,#10B981);border:none;border-radius:11px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 14px rgba(16,185,129,0.3);text-decoration:none;color:#fff;flex-shrink:0;}
  .btn-call:active{transform:scale(0.94);}
  .btn-info{background:rgba(252,211,77,0.08);border:1px solid rgba(252,211,77,0.22);border-radius:11px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--gold);flex-shrink:0;}

  .overlay{position:fixed;inset:0;z-index:1000;background:rgba(5,8,24,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}
  .sheet{width:100%;max-width:480px;background:linear-gradient(160deg,#0B1027,#161E3F);border:1px solid var(--line);border-top:1px solid rgba(252,211,77,0.3);border-radius:24px 24px 0 0;padding:22px 20px;padding-bottom:max(env(safe-area-inset-bottom,16px),36px);animation:slideUp .3s cubic-bezier(.16,1,.3,1);box-shadow:0 -24px 80px rgba(0,0,0,.6);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .sheet-handle{width:40px;height:4px;background:#334155;border-radius:2px;margin:0 auto 18px;}
  .sheet-biz-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .sheet-biz-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .sheet-biz-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--ink);letter-spacing:-.4px;line-height:1.1;}
  .sheet-biz-sub{font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.1em;margin-top:5px;font-family:'DM Mono',monospace;}
  .sheet-biz-rating{font-size:12.5px;color:#FBBF24;margin-top:5px;display:flex;align-items:center;gap:5px;font-weight:600;}
  .sheet-biz-rating .reviews{color:var(--muted-2);font-family:'DM Mono',monospace;font-size:11px;font-weight:normal;}
  .sheet-biz-hours{font-size:12px;color:#34D399;margin-top:5px;}
  .sheet-biz-status{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-top:6px;}
  .status-open{background:rgba(52,211,153,0.15);color:#34D399;}
  .status-closed{background:rgba(239,68,68,0.15);color:#FCA5A5;}

  .crm-section{background:rgba(15,23,42,0.5);border:1px solid var(--line-soft);border-radius:14px;padding:14px;margin-bottom:14px;}
  .crm-label{font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .crm-label .status{color:var(--muted-2);font-weight:normal;}
  .save-pills{display:flex;gap:6px;}
  .save-pill{flex:1;border:1px solid var(--line-soft);background:transparent;padding:10px 8px;border-radius:10px;font-size:12px;font-weight:600;color:var(--muted-2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;transition:all .15s;min-height:54px;}
  .save-pill .pill-ic{font-size:14px;}
  .save-pill:hover{color:var(--ink-2);}
  .save-pill.active.lead{background:rgba(96,165,250,0.18);border-color:var(--lead);color:var(--lead);box-shadow:0 0 0 1px rgba(96,165,250,0.3);}
  .save-pill.active.prospect{background:rgba(252,211,77,0.18);border-color:var(--prospect);color:var(--prospect);box-shadow:0 0 0 1px rgba(252,211,77,0.3);}
  .save-pill.active.client{background:rgba(52,211,153,0.18);border-color:var(--client);color:var(--client);box-shadow:0 0 0 1px rgba(52,211,153,0.3);}

  .notes-section{margin-top:12px;}
  .notes-textarea{width:100%;min-height:90px;max-height:180px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:11px;padding:11px 12px;color:var(--ink);font-size:13.5px;outline:none;resize:vertical;line-height:1.55;font-family:'Inter',sans-serif;}
  .notes-textarea:focus{border-color:rgba(252,211,77,0.35);}
  .notes-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;}
  .notes-saved{font-size:10.5px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.05em;flex:1;}
  .btn-save-notes{background:linear-gradient(135deg,#FCD34D,#F59E0B);border:none;border-radius:10px;padding:10px 18px;color:#0F0A02;font-weight:700;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-family:'Inter',sans-serif;min-height:38px;}

const MILES_TO_M = 1609.344;
const milesToMeters = mi => Math.round(mi * MILES_TO_M);

// ═════════════════════════════════════════════════════════════════════════════
// CATEGORIES — Google + OSM mappings
// ═════════════════════════════════════════════════════════════════════════════

// Google Places "includedTypes" use specific type strings.
// Reference: https://developers.google.com/maps/documentation/places/web-service/place-types
const CATEGORIES = [

    osm: "service:vehicle:oil_change~'yes'|shop~'car_repair'|amenity~'car_repair'|name~'oil change|jiffy lube|valvoline|take 5|midas|pennzoil|express oil|grease monkey|enterprise instant oil|sears auto|firestone complete|monro|mavis|big o tires|tires plus|goodyear auto|meineke|precision tune|aamco'"
  },

    google: { types: ['gas_station','car_repair','car_wash','car_dealer','car_rental','electric_vehicle_charging_station','tire_shop','auto_parts_store'] },
    osm: "amenity~'fuel|car_wash|car_repair|car_rental|charging_station|vehicle_inspection|motorcycle_parking'|shop~'car|car_repair|car_parts|tyres|tires|motorcycle|motorcycle_repair'"
  },
  // v1.5.1 — Tattoo: tattoo_parlor is NOT a valid type. Use body_art_service
  // (Google's real category for tattoo/piercing) + Text Search as backup.
  { id:'tattoo',  label:'Tattoo',      icon:'🎨',
    google: { types: ['body_art_service'], textQuery: 'tattoo shop OR tattoo studio OR body piercing' },
    osm: "shop~'tattoo|piercing'|name~'tattoo|ink|piercing'"
  },
  // v1.5.1 — removed invalid computer_store (electronics_store covers it)
  { id:'tech',    label:'Tech',        icon:'💻',
    google: { types: ['electronics_store','cell_phone_store'] },
    osm: "shop~'computer|electronics|mobile_phone|hifi|camera|copyshop'"
  },
  // v1.5.1 — removed general_contractor (Table B only, not a valid filter)
  { id:'home',    label:'Home',        icon:'🔧',
    google: { types: ['hardware_store','plumber','electrician','painter','roofing_contractor','locksmith','moving_company','laundry'] },

// ═════════════════════════════════════════════════════════════════════════════
// OSM (Overpass) query builder — unchanged from v1.4
// ═════════════════════════════════════════════════════════════════════════════

function parseTagGroups(tagSpec) { return tagSpec.split(/(?<=')\|(?=[a-z:_]+~)/i); }

function buildBlock(group, coord) {
  const [key, val] = group.split('~');
  if (val) {
    const clean = val.replace(/^'|'$/g, '');
    if (key === 'name') return `node["name"~"${clean}",i]${coord};`;
    return `node["name"]["${key}"~"${clean}",i]${coord};`;
  }
  return `node["name"]["${key}"]${coord};`;
}

function buildOsmQuery(lat, lon, radiusM, category) {
  const coord = `(around:${radiusM},${lat},${lon})`;
  if (category === 'all' || !category) {
    return `[out:json][timeout:30];(
      node["name"]["amenity"]${coord};
      node["name"]["shop"]${coord};
      node["name"]["craft"]${coord};
      node["name"]["office"]${coord};
      node["name"]["tourism"~"hotel|motel|hostel|guest_house|apartment"]${coord};
    );out body 80;`;
  }
  const cat = CATEGORIES.find(c => c.id === category);
  if (!cat?.osm) return buildOsmQuery(lat, lon, radiusM, 'all');
  const groups = parseTagGroups(cat.osm);
  const blocks = groups.map(g => buildBlock(g, coord));
  const limit = (category === 'oil' || category === 'auto') ? 120 : 80;
  return `[out:json][timeout:30];(${blocks.join('')});out body ${limit};`;
}

// ═════════════════════════════════════════════════════════════════════════════
// GOOGLE PLACES (New) — Nearby Search + Place Details
// ═════════════════════════════════════════════════════════════════════════════

async function fetchGooglePlaces(lat, lon, catId, radiusM) {
  // Google's nearbySearch max radius is 50,000 meters
  const radius = Math.min(radiusM, 50000);
  const cat = CATEGORIES.find(c => c.id === catId);
  const types = cat?.google?.types || [];

  // Use Nearby Search (New) for type-based, Text Search (New) for keyword-based
  // Some categories like Oil Change benefit from text search to catch franchise names.
  const useTextSearch = cat?.google?.textQuery && (catId === 'oil' || catId === 'tattoo');

  const fieldMask = [
    'places.id',
    'places.displayName',
    'places.formattedAddress',
    'places.location',
    'places.types',
    'places.primaryType',
    'places.primaryTypeDisplayName',
    'places.nationalPhoneNumber',
    'places.internationalPhoneNumber',
    'places.websiteUri',
    'places.googleMapsUri',
    'places.rating',
    'places.userRatingCount',
    'places.businessStatus',
    'places.regularOpeningHours',
    'places.currentOpeningHours',
    'places.priceLevel',
  ].join(',');

  if (useTextSearch) {
    const body = {
      textQuery: cat.google.textQuery,
      locationBias: { circle: { center: { latitude: lat, longitude: lon }, radius } },
      maxResultCount: 20,
    };
    const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GOOGLE_API_KEY,
        'X-Goog-FieldMask': fieldMask,
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('Google API error ' + res.status);
    const data = await res.json();
    return (data.places || []).map(toUnifiedFormat).map(b => ({ ...b, dist: haversine(lat, lon, b.lat, b.lon) }));
  }

  // Standard Nearby Search
  const body = {
    locationRestriction: { circle: { center: { latitude: lat, longitude: lon }, radius } },
    maxResultCount: 20,
    rankPreference: 'DISTANCE',
  };
  // v1.5.1 — only include types if we have any. Omitting includedTypes returns
  // every place type in the area (best for the "All" category).
  if (types && types.length > 0) body.includedTypes = types;
  const res = await fetch('https://places.googleapis.com/v1/places:searchNearby', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': GOOGLE_API_KEY,
      'X-Goog-FieldMask': fieldMask,
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Google API error ' + res.status + ': ' + err);
  }
  const data = await res.json();
  return (data.places || []).map(toUnifiedFormat).map(b => ({ ...b, dist: haversine(lat, lon, b.lat, b.lon) }));
}

// Map Google Places result → unified business shape (same as OSM)
function toUnifiedFormat(place) {
  const types = place.types || [];
  const primaryType = place.primaryType || (types[0] || '');
  // Reuse OSM tag shape so getColor/getEmoji/getTypeLabel work
  const tags = {
    name: place.displayName?.text || 'Unnamed',
    google_primary: primaryType,
    google_types: types,
    google_primary_display: place.primaryTypeDisplayName?.text,
  };
  if (place.nationalPhoneNumber) tags.phone = place.nationalPhoneNumber;
  else if (place.internationalPhoneNumber) tags.phone = place.internationalPhoneNumber;
  if (place.websiteUri) tags.website = place.websiteUri;
  if (place.formattedAddress) tags['addr:full'] = place.formattedAddress;
  if (place.regularOpeningHours?.weekdayDescriptions) {
    tags.opening_hours = place.regularOpeningHours.weekdayDescriptions[0] || '';
  }

  return {
    id: 'g_' + place.id,
    lat: place.location.latitude,
    lon: place.location.longitude,
    tags,
    rating: place.rating,
    userRatingCount: place.userRatingCount,
    businessStatus: place.businessStatus,
    googleMapsUri: place.googleMapsUri,
    openNow: place.currentOpeningHours?.openNow,
    priceLevel: place.priceLevel,
    source: 'google',
  };
}

// ═════════════════════════════════════════════════════════════════════════════
// VISUAL HELPERS — work with both Google and OSM data
// ═════════════════════════════════════════════════════════════════════════════

function isOilChange(tags) {
  if (tags['service:vehicle:oil_change'] === 'yes') return true;
  const types = tags.google_types || [];
  if (types.includes('oil_change_service')) return true;
  const n = (tags.name || '').toLowerCase();
  return /oil change|jiffy lube|valvoline|take 5|midas|pennzoil|express oil|grease monkey|enterprise instant oil|sears auto|firestone complete|monro|mavis|meineke|precision tune|aamco/i.test(n);
}
function isTattoo(tags) {
  if (tags.shop === 'tattoo' || tags.shop === 'piercing') return true;
  const types = tags.google_types || [];
  if (types.includes('tattoo_parlor')) return true;
  const n = (tags.name || '').toLowerCase();
  return /\btattoo\b|\bink\b|\bpiercing\b/i.test(n);
}

function getColor(tags) {
  if (isOilChange(tags)) return '#FB923C';
  if (isTattoo(tags)) return '#F472B6';
  const a = tags.amenity, s = tags.shop, t = tags.tourism, c = tags.craft, o = tags.office;
  const gt = tags.google_primary || '';
  if (gt.match(/restaurant|cafe|bar|food|bakery|coffee/) || a?.match(/restaurant|cafe|fast_food|bar|pub|food_court|ice_cream/)) return '#F97316';
  if (gt.match(/gas_station|charging|car/) || a?.match(/fuel|charging_station/) || s?.match(/^car$|car_parts|tyres|tires|motorcycle/)) return '#FBBF24';
  if (gt.match(/car_wash|car_repair|tire/) || a?.match(/car_wash|car_repair|car_rental|vehicle_inspection/)) return '#FBBF24';
  if (gt.match(/electronics|computer|phone/) || s?.match(/computer|electronics|mobile_phone|hifi|camera/)) return '#60A5FA';
  if (gt.match(/hardware|plumber|electrician|painter|roofing|contractor|locksmith/) || c || s?.match(/hardware|locksmith|appliance|paint|doityourself/)) return '#FB923C';
  if (gt.match(/pharmacy|hospital|dentist|doctor|veterinary|medical|drugstore|physiotherapist|chiropractor/) || a?.match(/pharmacy|hospital|clinic|doctors|dentist|veterinary/) || s?.match(/optician|medical/)) return '#22D3EE';
  if (gt.match(/beauty|hair|nail|barber|spa|massage/) || s?.match(/hairdresser|beauty|cosmetics|massage|nail/) || a?.match(/spa/)) return '#F472B6';
  if (gt.match(/bank|atm|post_office|lawyer|accounting|insurance|real_estate/) || a?.match(/bank|atm|post|police|library|courthouse/) || o) return '#A78BFA';
  if (gt.match(/hotel|motel|lodging|bed_and_breakfast|resort/) || t) return '#F472B6';
  if (gt.match(/store|shop|grocery|supermarket/) || s) return '#34D399';
  return '#94A3B8';
}

function getEmoji(tags) {
  if (isOilChange(tags)) return '🛢️';
  if (isTattoo(tags)) return '🎨';
  const gt = tags.google_primary || '';
  const a = tags.amenity, s = tags.shop, t = tags.tourism, c = tags.craft, o = tags.office;

  // Google primary type checks
  if (gt.match(/pizza_restaurant/)) return '🍕';
  if (gt.match(/restaurant|meal_takeaway|sandwich_shop|fast_food/)) return '🍽️';
  if (gt.match(/cafe|coffee_shop|bakery/)) return '☕';
  if (gt.match(/ice_cream/)) return '🍦';
  if (gt.match(/bar/)) return '🍺';
  if (gt === 'gas_station') return '⛽';

function getTypeLabel(tags) {
  if (isOilChange(tags)) return 'oil change';
  if (isTattoo(tags)) return 'tattoo shop';
  if (tags.google_primary_display) return tags.google_primary_display.toLowerCase();
  if (tags.google_primary) return tags.google_primary.replace(/_/g, ' ');
  const a = tags.amenity, s = tags.shop, t = tags.tourism, c = tags.craft, o = tags.office;
  if (a) return a.replace(/_/g,' ');
  if (s) return s.replace(/_/g,' ');
  if (c) return c.replace(/_/g,' ');
  if (o) return o.replace(/_/g,' ') + ' office';
  if (t) return t.replace(/_/g,' ');
  return 'business';
}

function getPhone(tags) {
  return tags.phone || tags['contact:phone'] || tags.telephone || null;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371e3, f1=lat1*Math.PI/180, f2=lat2*Math.PI/180;
  const a=Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin((lon2-lon1)*Math.PI/360)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function formatDist(m) {
  const ft = m * 3.28084;
  if (ft < 528) return `${Math.round(ft)} ft`;
  const mi = m / MILES_TO_M;
  if (mi < 10) return `${mi.toFixed(1)} mi`;
  return `${Math.round(mi)} mi`;
}

function getPlatform() {
  const ua = navigator.userAgent||'';
  if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
  if (/Android/i.test(ua)) return 'android';
  return 'desktop';
}

function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}
function cleanPhone(p) { return p.replace(/[\s\-().]/g, ''); }

function timeAgo(ms) {
  const s = Math.floor((Date.now()-ms)/1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60); if (h < 24) return `${h}h ago`;
  const d = Math.floor(h/24); if (d < 30) return `${d}d ago`;
  return new Date(ms).toLocaleDateString();
}

function renderRatingStars(rating) {
  if (!rating) return '';

// ─── Network ──────────────────────────────────────────────────────────────────
async function fetchBusinesses(lat, lon, cat, radiusM) {
  setState({ loading:true, error:null });
  try {
    if (state.source === 'google') {
      const results = await fetchGooglePlaces(lat, lon, cat, radiusM);
      const seen = new Set();
      const dedup = results.filter(r => { if (seen.has(r.id)) return false; seen.add(r.id); return true; });
      dedup.sort((a,b) => a.dist-b.dist);
      setState({ businesses: dedup, loading:false });
    } else {
      const q = buildOsmQuery(lat, lon, radiusM, cat);
      const res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:q });
      const data = await res.json();
      let elements = (data.elements||[])
        .filter(e => e.tags?.name)
        .map(e => ({ ...e, dist: haversine(lat,lon,e.lat,e.lon), source:'osm' }));
      const seen = new Set();
      elements = elements.filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });
      if (cat === 'oil') elements = elements.filter(e => isOilChange(e.tags) || e.tags.amenity==='car_repair' || e.tags.shop==='car_repair');
      if (cat === 'tattoo') elements = elements.filter(e => isTattoo(e.tags));
      elements.sort((a,b) => a.dist-b.dist);
      elements = elements.slice(0, 100);
      setState({ businesses: elements, loading:false });
    }
  } catch (e) {
    console.error('[Polaris] Fetch failed:', e);
    let msg = 'Could not load businesses. Check your connection.';
    if (state.source === 'google' && e.message?.includes('Google API error')) {
      if (e.message.includes('403')) {
        msg = 'Google API key rejected. Check Google Cloud Console: your key must allow this domain (https://albanusdesign-alt.github.io/Polaris/*) and Places API (New) must be enabled.';
      } else if (e.message.includes('429') || e.message.includes('RESOURCE_EXHAUSTED')) {
        msg = 'Google quota exceeded. Switching to OSM…';
        setState({ source: 'osm', error: null });
        persistPrefs();
        showToast('Switched to OSM (Google quota hit)');
        return fetchBusinesses(lat, lon, cat, radiusM);
      } else if (e.message.includes('400') || e.message.includes('INVALID_ARGUMENT')) {
        msg = 'Google rejected the request. This category may have an invalid type. Try OSM mode or a different category.';
      } else {
        msg = 'Google Places error. Try OSM mode below.';
      }
    }
    setState({ error: msg, loading:false });
  }
}

function getLocation() {
  setState({ locating:true, error:null, permDenied:false });
  if (!navigator.geolocation) { setState({ showManual:true, locating:false }); return; }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude:lat, longitude:lon } = pos.coords;
      let label = 'Current Location';
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,{headers:{'Accept-Language':'en'}});
        const d = await r.json();
        const parts = [d.address?.suburb||d.address?.neighbourhood, d.address?.city||d.address?.town||d.address?.village].filter(Boolean);
        if (parts.length) label = parts.slice(0,2).join(', ');
      } catch {}
      setState({ location:{lat,lon}, locationLabel:label, locating:false });
      fetchBusinesses(lat, lon, state.category, milesToMeters(state.radiusMiles));
    },
    err => {
      setState({ locating:false, showManual:true, permDenied: err.code===1,
        error: err.code===1 ? null : err.code===2 ? 'Position unavailable. Enter your address below.' : 'Location timed out. Enter your address below.' });
    },
    { enableHighAccuracy:true, timeout:12000, maximumAge:60000 }
  );
}

async function geocodeAddress() {
  const addr = state.manualAddress.trim();
  if (!addr) return;
  setState({ geocoding:true, error:null });
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
    const data = await res.json();
    if (!data.length) { setState({ error:'Address not found. Try a more specific location.', geocoding:false }); return; }
    const loc = { lat:parseFloat(data[0].lat), lon:parseFloat(data[0].lon) };
    const label = data[0].display_name?.split(',').slice(0,2).join(',').trim() || addr;
    setState({ location:loc, locationLabel:label, showManual:false, permDenied:false, geocoding:false });
    fetchBusinesses(loc.lat, loc.lon, state.category, milesToMeters(state.radiusMiles));
  } catch { setState({ error:'Could not look up that address.', geocoding:false }); }
}

  const actions = [
    phone && { icon:'📞', label:'Call Now', sub:phone, color:'#34D399', href:`tel:${cleanPhone(phone)}` },
    email && { icon:'✉️', label:'Send Email', sub:email, color:'#A78BFA', href:`mailto:${email}` },
    website && { icon:'🌐', label:'Visit Website', sub:website.replace(/^https?:\/\//,'').slice(0,40), color:'#60A5FA', href:website.startsWith('http')?website:`https://${website}`, target:'_blank' },
    { icon:'🗺️', label:'Directions', sub:fullAddr||'Open in Maps', color:'#FCD34D', href:mapsUrl, target:'_blank' },
    { icon:'🔍', label:'Search Online', sub:tags.name, color:'#94A3B8', href:`https://google.com/search?q=${encodeURIComponent(tags.name+(fullAddr?' '+fullAddr:''))}`, target:'_blank' },
  ].filter(Boolean);

  const actionsHtml = actions.map(a => `<a href="${esc(a.href)}"${a.target?` target="${a.target}"`:''} rel="noopener" class="action-btn"><div class="action-icon" style="background:${a.color}18;border:1px solid ${a.color}35">${a.icon}</div><div style="flex:1;min-width:0"><div class="action-label">${esc(a.label)}</div><div class="action-sub">${esc(a.sub)}</div></div><span class="action-arrow">›</span></a>`).join('');

  const hoursHtml = hours ? `<div class="sheet-biz-hours">⏱ ${esc(hours.length>50?hours.slice(0,50)+'…':hours)}</div>` : '';
  const distHtml = showDist ? esc(formatDist(biz.dist)) : '';
  window._currentBiz = biz;

  return `<div class="overlay" onclick="closeBiz()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-biz-header"><div class="sheet-biz-icon" style="background:${color}20;border:1.5px solid ${color}55">${getEmoji(tags)}</div><div style="min-width:0;flex:1"><div class="sheet-biz-name">${esc(tags.name)}</div><div class="sheet-biz-sub">${esc(getTypeLabel(tags))}${distHtml?' · '+distHtml:''}</div>${ratingHtml}${statusHtml}${hoursHtml}</div></div>${crmSection}<div class="actions-divider"></div>${warn}<div class="actions">${actionsHtml}</div></div></div>`;
}

function renderLanding() {
  const { locating, permDenied, error, showManual, manualAddress, geocoding, radiusMiles } = state;
  const platform = getPlatform();
  const permBox = permDenied ? `<div class="perm-box"><div class="perm-title"><span>🔒</span> Location Access Blocked</div><p class="perm-text">${platform==='ios' ? 'Go to iPhone <b style="color:#FCD34D">Settings → Privacy & Security → Location Services</b> → your browser → <b style="color:#86EFAC">Allow While Using App</b>.' : ''}${platform==='android' ? 'Go to <b style="color:#FCD34D">Settings → Apps</b> → your browser → <b style="color:#FCD34D">Permissions → Location</b> → <b style="color:#86EFAC">Allow</b>.' : ''}${platform==='desktop' ? 'Click the 🔒 lock in the address bar → allow Location → refresh.' : ''}</p><button class="btn-guide" onclick="setState({showGuide:true,guideTab:'${platform}'})">📖 Step-by-step guide for all devices</button><div class="perm-divider">Or enter your location manually below ↓</div></div>` : '';
  const errorBox = error ? `<div class="error-box">${esc(error)}</div>` : '';
  const manualBox = showManual ? `<div style="width:100%;max-width:340px"><div class="manual-label">◈ Enter Location Manually</div><div class="manual-row"><input class="manual-input" type="text" inputmode="search" placeholder="City, address, or ZIP" value="${esc(manualAddress)}" oninput="onManualInput(this.value)" onkeydown="if(event.key==='Enter')geocodeAddress()"><button class="btn-go" onclick="geocodeAddress()" ${geocoding||!manualAddress.trim()?'disabled':''}>${geocoding?'…':'Go'}</button></div></div>` : '';
  const manualLink = !showManual && !permDenied ? `<button class="btn-manual-link" onclick="setState({showManual:true})">Enter location manually instead ›</button>` : '';

  return `<div class="landing"><div style="text-align:center"><div class="compass"><div class="compass-ring3"></div><div class="compass-ring2"></div><div class="compass-ring"></div><div class="compass-core">✦</div></div><p class="tagline"><em>Set your bearings.</em><br>Discover and instantly contact businesses around you.</p></div><div class="radius-panel"><div class="source-label">Data Source</div>${renderSourceToggle()}<div class="radius-head"><span class="lbl">Scan Radius</span><span class="val">${radiusMiles}<em>mi</em></span></div><input type="range" min="1" max="25" step="1" value="${radiusMiles}" oninput="onRadiusInput(this.value)"><div class="radius-ends"><span>1 MI</span><span>25 MI</span></div></div><button class="btn-scan" onclick="getLocation()" ${locating?'disabled':''}><span class="star-ic">✦</span>${locating?'Locating…':'Begin Wayfinding'}</button>${permBox}${errorBox}${manualBox}${manualLink}</div>`;
}

function renderBizCard(biz, i) {
  const color = getColor(biz.tags);
  const phone = getPhone(biz.tags);
  const hasContact = !!(phone || biz.tags.website || biz.tags.email);
  const save = getSave(biz.id);
  const savedClass = save?.category ? ` saved-${save.category}` : '';
  const tagBadge = save?.category ? `<span class="saved-tag ${save.category}">${save.category}</span>` : '';
  const noteBadge = save?.notes ? `<span class="note-badge">📝</span>` : '';
  const callBtn = phone
    ? `<a href="tel:${esc(cleanPhone(phone))}" class="btn-call" onclick="event.stopPropagation()" aria-label="Call ${esc(biz.tags.name)}">📞</a>`
    : `<button class="btn-info" onclick="event.stopPropagation();selectBiz(window._bizData[${i}])" aria-label="More info">›</button>`;
  const distHtml = typeof biz.dist === 'number' ? `<span class="biz-dist">${esc(formatDist(biz.dist))}</span>` : '';
  const ratingHtml = biz.rating ? `<span class="biz-rating"><span>★</span><span>${biz.rating.toFixed(1)}</span>${biz.userRatingCount ? `<span class="reviews">(${biz.userRatingCount > 999 ? Math.floor(biz.userRatingCount/1000)+'k' : biz.userRatingCount})</span>` : ''}</span>` : '';
  return `<div class="biz-card${hasContact?' has-contact':''}${savedClass}" style="animation:fadeSlide .4s ease ${Math.min(i,15)*0.04}s both" onclick="selectBiz(window._bizData[${i}])"><div class="biz-icon" style="background:${color}18;border:1px solid ${color}40">${getEmoji(biz.tags)}</div><div class="biz-info"><div class="biz-name">${esc(biz.tags.name)}</div><div class="biz-meta"><span class="biz-type">${esc(getTypeLabel(biz.tags))}</span>${distHtml ? '<span class="biz-dot"></span>'+distHtml : ''}${ratingHtml}${tagBadge}${noteBadge}</div></div><div class="biz-actions">${callBtn}</div></div>`;
}

function renderListBody(list) {
  if (state.loading) return `<div class="spinner"><div class="spinner-ring"></div><p>Scanning ${state.radiusMiles} mile radius via ${state.source==='google'?'Google Places':'OSM'}…</p></div>`;
  if (list.length === 0) return `<div class="empty"><div class="empty-icon">✦</div><h3>Nothing Found</h3><p>${state.search ? 'No businesses match your search.' : 'Try a wider radius or a different category.<br>Tap ← to adjust your range.'}</p></div>`;
  return list.map((biz, i) => renderBizCard(biz, i)).join('');
}

function renderResults() {
  const { category, radiusMiles, search, error, loading, source } = state;
  const filtered = getFilteredBusinesses();
  window._bizData = filtered;
  const catsHtml = CATEGORIES.map(cat => `<button class="cat-btn${category===cat.id?' active':''}" onclick="pickCategory('${cat.id}')">${cat.icon} ${cat.label}</button>`).join('');
  const errorHtml = error && !loading ? `<div class="error-box" style="margin-bottom:12px">${esc(error)}</div>` : '';
  const sourceLabel = source==='google' ? `<span class="source-tag google">◉ Google</span>` : `<span class="source-tag">◇ OSM</span>`;
  return `<div class="results"><div class="results-toolbar"><button class="btn-back" onclick="backToRange()" aria-label="Back to range adjuster"><span class="ar">‹</span> Range</button><div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" type="search" placeholder="Filter by name…" value="${esc(search)}" oninput="onSearchInput(this.value)"></div></div>${renderSourceToggle()}<div class="cats">${catsHtml}</div><div class="stats"><span class="count">${loading?'Scanning…':filtered.length+' results'}</span><span>${radiusMiles} mi · ${sourceLabel}</span></div>${errorHtml}<div class="list">${renderListBody(filtered)}</div></div>`;
}

function renderSaved() {
  const { savedTab } = state;
  const tabs = [{ id:'lead', label:'Leads', color:'lead' },{ id:'prospect',label:'Prospects', color:'prospect'},{ id:'client', label:'Clients', color:'client' }];
  const tabsHtml = tabs.map(t => `<button class="saved-tab ${t.color}${savedTab===t.id?' active':''}" onclick="setState({savedTab:'${t.id}'})"><span>${t.label}</span><span class="tcount">${countByCategory(t.id)}</span></button>`).join('');
  const list = getSavesByCategory(savedTab);
  const bizList = list.map(s => {
    const biz = { ...s.biz };
    if (state.location) biz.dist = haversine(state.location.lat, state.location.lon, biz.lat, biz.lon);
    return biz;
  });
  window._bizData = bizList;
  let listContent;
  if (bizList.length === 0) {
    const tabLabel = tabs.find(t => t.id === savedTab)?.label || 'businesses';
    listContent = `<div class="empty"><div class="empty-icon">✦</div><h3>No ${tabLabel} Yet</h3><p>Save businesses from the main scan to track them here. Tap any business card and choose Lead, Prospect, or Client.</p></div>`;
  } else {
    listContent = bizList.map((biz, i) => renderBizCard(biz, i)).join('');
  }
  return `<div class="results"><div class="results-toolbar"><button class="btn-back" onclick="closeSaved()" aria-label="Back to main"><span class="ar">‹</span> Back</button><div style="flex:1;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink);font-weight:600;letter-spacing:-.3px;padding-left:6px">Saved Businesses</div></div><div class="saved-tabs">${tabsHtml}</div><div class="stats"><span class="count">${bizList.length} ${bizList.length===1?'entry':'entries'}</span><span>${totalSaves()} total saved</span></div><div class="list">${listContent}</div></div>`;
}

function render() {
  const { view, location, locationLabel, selected, showGuide, showAbout, toast } = state;
  const total = totalSaves();
  const locHtml = location && locationLabel && view==='main' ? `<div class="header-loc"><span class="dot"></span>${esc(locationLabel)}</div>` : '';
  const savedBadge = total > 0 ? `<span class="badge">${total}</span>` : '';
  const headerRight = `<div class="header-actions">${view==='main' && location ? `<button class="btn-icon" onclick="getLocation()" aria-label="Rescan">↻</button>` : ''}<button class="btn-icon" onclick="openSaved()" aria-label="Saved" style="background:rgba(252,211,77,0.12)">🗂${savedBadge}</button><button class="btn-icon" onclick="setState({showAbout:true})" aria-label="About">✦</button></div>`;
  let body;
  if (view === 'saved') body = renderSaved();
  else if (location) body = renderResults();
  else body = renderLanding();
  const overlay = selected ? renderContact() : '';
  const guide   = showGuide ? renderGuide() : '';
  const about   = showAbout ? renderAbout() : '';
  const toastHtml = toast ? `<div class="toast"><span class="check">✦</span>${esc(toast)}</div>` : '';
  document.getElementById('app').innerHTML = `<div class="header"><div class="brand-row"><div><div class="brand-mark"><span class="brand-star">✦</span><span class="brand-eyebrow">Stellaris Solutions</span></div><h1 class="brand-name">Polaris <em>Wayfinder</em></h1><div class="brand-sub">Business Locator <span style="color:var(--gold-dim)">· v1.5.1</span></div>${locHtml}</div>${headerRight}</div></div>${body}${overlay}${guide}${about}${toastHtml}`;
}

render();
</script>
</body>
</html>
